# docker/docker-compose.yml

version: "3.9"

services:
  ml-api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: ml_model_api
    ports:
      - "8080:8080"
    volumes:
      - ../src:/app/src
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
